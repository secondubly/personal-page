title = 'tarik massac'
baseURL = 'https://example.org/'

# This is what goes in <html lang="">
languageCode = 'en-us'

# This defines how dates are formatted
defaultContentLanguage = "en-us"

# Enable emojis globally
enableEmoji = true

# enable hugo blog awesome theme
[module]
  [[module.imports]]
    path = "github.com/hugo-sid/hugo-blog-awesome"

# set markup.highlight.noClasses=false to enable code highlight
[markup]
  [markup.highlight]
    noClasses = false

## US English
[Languages.en-us]
  languageName='English (USA)'
  languageCode='en-us'


[Languages.en-us.menu]
  [[Languages.en-us.menu.main]]
    # The page reference (pageRef) is useful for menu highlighting
    # When pageRef is set, setting `url` is optional; it will be used as a fallback if the page is not found.
    pageRef="/"
    name = 'Home'
    url = '/'
    weight = 10
  [[Languages.en-gb.menu.main]]
    pageRef="about"
    name = 'About'
    url = '/about/'
    weight = 20

[Languages.en-us.params]
  sitename="tarik massac"
  defaultColor="auto"
  description = "Minimal Hugo blog theme with light and dark mode support"

[Languages.en-us.params.author]
  avatar = "avatar.jpg" # put the file in assets folder; also ensure that image has same height and width
  # Note: image is not rendered if the resource(avatar image) is not found. No error is displayed.
  intro = "Software Engineer"
  name = "Tarik M"
  description = "A fast, minimalistic Hugo theme with light and dark mode support, for running a personal site or blog."

[[params.socialIcons]]
name = "github"
url = "https://github.com/secondubly"